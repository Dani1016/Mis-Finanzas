<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Master - Calculadora Inteligente</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f1f5f9; --tc: #9b59b6; --ocio: #3498db; --fijo: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 90vh; }
        
        .dashboard { background: var(--dark); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .dashboard h1 { margin: 10px 0; font-size: 2.2rem; color: var(--primary); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #e2e8f0; font-weight: bold; font-size: 0.75rem; }
        .tab-btn.active { background: var(--dark); color: white; }

        .view { display: none; }
        .view.active { display: block; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-add { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .card { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #f1f5f9; border-left: 6px solid #ddd; }
        .card.fijo { border-left-color: var(--fijo); }
        .card.cuota { border-left-color: var(--tc); }
        .card.pagado { background: #ecfdf5; opacity: 0.6; border-color: #a7f3d0; }
        
        .actions { display: flex; gap: 10px; align-items: center; }
        .btn-edit { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        .btn-check { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .pagado .btn-check { background: var(--primary); color: white; }

        #auth-container { text-align: center; padding: 40px 10px; }
    </style>
</head>
<body>

<div class="app">
    <div id="auth-container">
        <h2>Finanzas Master</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Clave">
        <button class="btn-add" onclick="handleAuth()">Entrar / Registrarse</button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="dashboard">
            <small>DISPONIBLE REAL</small>
            <h1 id="txtSaldo">$ 0</h1>
            <div style="display: flex; gap: 5px; justify-content: center;">
                <input type="number" id="inSueldo" placeholder="Sueldo" style="width:130px; background:rgba(255,255,255,0.1); border:none; color:white; text-align:center;">
                <button onclick="saveSueldo()" style="background:var(--primary); border:none; color:white; padding:10px; border-radius:8px;">✔</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showView('v-list', this)">Pagos</button>
            <button class="tab-btn" onclick="showView('v-add', this)">+ Nuevo</button>
        </div>

        <div id="v-list" class="view active">
            <div id="listaContenido"></div>
            <button onclick="cerrarMes()" style="width:100%; padding:15px; background:#6366f1; color:white; border:none; border-radius:12px; font-weight:bold; margin-top:20px;">CERRAR MES</button>
        </div>

        <div id="v-add" class="view">
            <div style="background: #f8fafc; padding: 15px; border-radius: 15px;">
                <h3 id="formTitle">Nuevo Gasto</h3>
                <input type="hidden" id="editId">
                <select id="tipoGasto" onchange="checkTipo()">
                    <option value="fijo">Gasto Fijo (Servicios/Arriendo)</option>
                    <option value="cuota">Deuda por Cuotas (Iberia/Bancos)</option>
                </select>
                <input type="text" id="gDesc" placeholder="Descripción (ej. Iberia)">
                
                <div id="divFijo">
                    <input type="number" id="gMontoFijo" placeholder="Valor del mes $">
                </div>

                <div id="divCuotas" style="display:none;">
                    <input type="number" id="gTotalPrestamo" placeholder="Valor total de la deuda $">
                    <input type="number" id="gInteres" placeholder="% Interés mensual (ej. 1.87)">
                    <input type="number" id="gCuotasTotales" placeholder="¿A cuántas cuotas?">
                    <input type="number" id="gCuotaActual" placeholder="¿Qué cuota vas a pagar?">
                    <p id="previewCuota" style="font-size: 0.8rem; color: var(--tc); font-weight: bold;"></p>
                </div>
                
                <input type="text" id="gExtra" placeholder="Detalle extra">
                <button class="btn-add" onclick="saveItem()" id="btnGuardar">Guardar Registro</button>
                <button class="btn-add" style="background:#ccc; margin-top:5px; display:none;" id="btnCancelar" onclick="cancelarEdicion()">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCK-3pbwqS7QkExbTuT8bLmVKMlqO-govk",
        authDomain: "appd-111a4.firebaseapp.com",
        projectId: "appd-111a4",
        storageBucket: "appd-111a4.firebasestorage.app",
        messagingSenderId: "935117162187",
        appId: "1:935117162187:web:085da4da7cde9ef854fd4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let pagadosLocal = JSON.parse(localStorage.getItem('pagados_fb')) || {};

    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            await auth.signInWithEmailAndPassword(e, p);
        } catch {
            await auth.createUserWithEmailAndPassword(e, p);
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) { currentUser = user; document.getElementById('auth-container').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; loadData(); }
    });

    function checkTipo() {
        const tipo = document.getElementById('tipoGasto').value;
        document.getElementById('divFijo').style.display = tipo === 'fijo' ? 'block' : 'none';
        document.getElementById('divCuotas').style.display = tipo === 'cuota' ? 'block' : 'none';
    }

    // FÓRMULA FRANCESA (AMORTIZACIÓN)
    function calcularCuotaMensual(p, i, n) {
        if (!p || !i || !n) return 0;
        const tasa = i / 100;
        return (p * tasa * Math.pow(1 + tasa, n)) / (Math.pow(1 + tasa, n) - 1);
    }

    async function saveItem() {
        const id = document.getElementById('editId').value;
        const tipo = document.getElementById('tipoGasto').value;
        let montoFinal = 0;
        let data = {
            desc: document.getElementById('gDesc').value,
            extra: document.getElementById('gExtra').value,
            tipo: tipo,
            createdAt: Date.now()
        };

        if(tipo === 'fijo') {
            montoFinal = parseFloat(document.getElementById('gMontoFijo').value);
        } else {
            const p = parseFloat(document.getElementById('gTotalPrestamo').value);
            const i = parseFloat(document.getElementById('gInteres').value);
            const n = parseInt(document.getElementById('gCuotasTotales').value);
            montoFinal = calcularCuotaMensual(p, i, n);
            data.valorTotal = p;
            data.interes = i;
            data.nCuotas = n;
            data.actual = parseInt(document.getElementById('gCuotaActual').value);
        }
        data.monto = montoFinal;

        if(id) await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(id).update(data);
        else await db.collection('usuarios').doc(currentUser.uid).collection('gastos').add(data);
        
        cancelarEdicion();
        loadData();
        showView('v-list', document.querySelector('.tab-btn'));
    }

    async function editItem(id) {
        const doc = await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(id).get();
        const g = doc.data();
        document.getElementById('editId').value = id;
        document.getElementById('tipoGasto').value = g.tipo;
        document.getElementById('gDesc').value = g.desc;
        document.getElementById('gExtra').value = g.extra;
        
        if(g.tipo === 'fijo') {
            document.getElementById('gMontoFijo').value = g.monto;
        } else {
            document.getElementById('gTotalPrestamo').value = g.valorTotal;
            document.getElementById('gInteres').value = g.interes;
            document.getElementById('gCuotasTotales').value = g.nCuotas;
            document.getElementById('gCuotaActual').value = g.actual;
        }
        
        document.getElementById('formTitle').innerText = "Editando Registro";
        document.getElementById('btnGuardar').innerText = "Actualizar Cambios";
        document.getElementById('btnCancelar').style.display = "block";
        checkTipo();
        showView('v-add', document.querySelectorAll('.tab-btn')[1]);
    }

    function cancelarEdicion() {
        document.getElementById('editId').value = "";
        document.getElementById('gDesc').value = "";
        document.getElementById('gMontoFijo').value = "";
        document.getElementById('gTotalPrestamo').value = "";
        document.getElementById('formTitle').innerText = "Nuevo Gasto";
        document.getElementById('btnGuardar').innerText = "Guardar Registro";
        document.getElementById('btnCancelar').style.display = "none";
    }

    async function loadData() {
        const userDoc = await db.collection('usuarios').doc(currentUser.uid).get();
        let sueldo = userDoc.exists ? (userDoc.data().sueldo || 0) : 0;
        document.getElementById('inSueldo').value = sueldo;

        const snapshot = await db.collection('usuarios').doc(currentUser.uid).collection('gastos').get();
        const listCont = document.getElementById('listaContenido');
        listCont.innerHTML = "";
        let totalPagado = 0;

        snapshot.forEach(doc => {
            const g = doc.data();
            const id = doc.id;
            if(pagadosLocal[id]) totalPagado += g.monto;
            
            listCont.innerHTML += `
                <div class="card ${g.tipo} ${pagadosLocal[id] ? 'pagado' : ''}">
                    <div>
                        <b>${g.desc}</b><br>
                        <small>${g.tipo === 'fijo' ? g.extra : 'Cuota '+g.actual+' de '+g.nCuotas}</small>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editItem('${id}')">✎</button>
                        <button class="btn-check" onclick="togglePago('${id}')">$${Math.round(g.monto).toLocaleString()}</button>
                    </div>
                </div>`;
        });
        const saldo = sueldo - totalPagado;
        document.getElementById('txtSaldo').innerText = `$ ${Math.round(saldo).toLocaleString()}`;
        document.getElementById('txtSaldo').style.color = saldo < 0 ? "#e74c3c" : "#2ecc71";
    }

    function togglePago(id) { pagadosLocal[id] = !pagadosLocal[id]; localStorage.setItem('pagados_fb', JSON.stringify(pagadosLocal)); loadData(); }
    async function saveSueldo() { await db.collection('usuarios').doc(currentUser.uid).set({ sueldo: parseFloat(document.getElementById('inSueldo').value) }, { merge: true }); loadData(); }
    function showView(id, btn) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }

    async function cerrarMes() {
        if(!confirm("¿Avanzar al siguiente mes?")) return;
        const snapshot = await db.collection('usuarios').doc(currentUser.uid).collection('gastos').get();
        for (const doc of snapshot.docs) {
            const g = doc.data();
            if(g.tipo === 'cuota' && pagadosLocal[doc.id]) {
                if(g.actual >= g.nCuotas) await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(doc.id).delete();
                else await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(doc.id).update({ actual: g.actual + 1 });
            }
        }
        pagadosLocal = {}; localStorage.setItem('pagados_fb', JSON.stringify(pagadosLocal));
        loadData();
    }
</script>
</body>
</html>
