<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Master - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f1f5f9; --tc: #9b59b6; --ocio: #3498db; --fijo: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 90vh; }
        
        .dashboard { background: var(--dark); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .dashboard h1 { margin: 10px 0; font-size: 2.2rem; color: var(--primary); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #e2e8f0; font-weight: bold; font-size: 0.75rem; min-width: 80px; }
        .tab-btn.active { background: var(--dark); color: white; }

        .view { display: none; }
        .view.active { display: block; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-add { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-alt { width: 100%; padding: 10px; background: none; border: 1px solid var(--dark); color: var(--dark); border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        
        .card { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #f1f5f9; border-left: 6px solid #ddd; }
        .card.fijo { border-left-color: var(--fijo); }
        .card.cuota { border-left-color: var(--tc); }
        .card.ocio { border-left-color: var(--ocio); }
        .card.pagado { background: #ecfdf5; opacity: 0.6; border-color: #a7f3d0; }
        
        .btn-check { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .pagado .btn-check { background: var(--primary); color: white; }

        .section-title { font-size: 0.8rem; font-weight: bold; color: #64748b; text-transform: uppercase; margin: 15px 0 5px; }
        #auth-container { text-align: center; padding: 40px 10px; }
    </style>
</head>
<body>

<div class="app">
    <div id="auth-container">
        <h2 id="auth-title">Bienvenido</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-main" class="btn-add" onclick="handleAuth()">Iniciar Sesión</button>
        <button id="btn-toggle" class="btn-alt" onclick="toggleMode()">Crear cuenta nueva</button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="dashboard">
            <small>DISPONIBLE REAL</small>
            <h1 id="txtSaldo">$ 0</h1>
            <div style="display: flex; gap: 5px; justify-content: center;">
                <input type="number" id="inSueldo" placeholder="Sueldo" style="width:130px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; margin:0; text-align:center;">
                <button onclick="saveSueldo()" style="background:var(--primary); border:none; color:white; padding:10px; border-radius:8px; cursor:pointer;">✔</button>
            </div>
            <button onclick="logout()" style="margin-top:15px; background:none; border:none; color:#ff7675; cursor:pointer; font-size:0.7rem;">CERRAR SESIÓN</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showView('v-list', this)">Mis Pagos</button>
            <button class="tab-btn" onclick="showView('v-add', this)">+ Gasto</button>
            <button class="tab-btn" onclick="showView('v-ocio', this)">Ocio</button>
        </div>

        <div id="v-list" class="view active">
            <div class="section-title">Fijos y Cuotas</div>
            <div id="listaContenido"></div>
            <button onclick="cerrarMes()" style="width:100%; padding:15px; background:#6366f1; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:20px;">Cerrar Mes</button>
        </div>

        <div id="v-ocio" class="view">
            <div class="section-title">Gastos de Ocio</div>
            <div id="listaOcio"></div>
        </div>

        <div id="v-add" class="view">
            <div style="background: #f8fafc; padding: 15px; border-radius: 15px;">
                <h3>Nuevo Registro</h3>
                <select id="tipoGasto" onchange="checkTipo()">
                    <option value="fijo">Gasto Fijo</option>
                    <option value="cuota">Deuda por Cuotas</option>
                    <option value="ocio">Gasto de Ocio (Diario)</option>
                </select>
                <input type="text" id="gDesc" placeholder="Descripción">
                <input type="number" id="gMonto" placeholder="Monto $">
                <input type="text" id="gExtra" placeholder="Detalle (Banco, lugar, etc)">
                <div id="divCuotas" style="display:none;">
                    <input type="number" id="gTotal" placeholder="Cuotas Totales">
                    <input type="number" id="gActual" placeholder="Cuota Actual">
                </div>
                <button class="btn-add" onclick="saveItem()">Guardar Registro</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCK-3pbwqS7QkExbTuT8bLmVKMlqO-govk",
        authDomain: "appd-111a4.firebaseapp.com",
        projectId: "appd-111a4",
        storageBucket: "appd-111a4.firebasestorage.app",
        messagingSenderId: "935117162187",
        appId: "1:935117162187:web:085da4da7cde9ef854fd4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLoginMode = true;
    let currentUser = null;
    let pagadosLocal = JSON.parse(localStorage.getItem('pagados_fb')) || {};

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Bienvenido" : "Crear Cuenta";
        document.getElementById('btn-main').innerText = isLoginMode ? "Iniciar Sesión" : "Registrarse Ahora";
        document.getElementById('btn-toggle').innerText = isLoginMode ? "Registrarme" : "Ya tengo cuenta";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            if (isLoginMode) await auth.signInWithEmailAndPassword(e, p);
            else await auth.createUserWithEmailAndPassword(e, p);
        } catch (err) { alert(err.message); }
    }

    function logout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        }
    });

    async function saveSueldo() {
        const val = parseFloat(document.getElementById('inSueldo').value) || 0;
        await db.collection('usuarios').doc(currentUser.uid).set({ sueldo: val }, { merge: true });
        loadData();
    }

    async function saveItem() {
        const tipo = document.getElementById('tipoGasto').value;
        const data = {
            desc: document.getElementById('gDesc').value,
            monto: parseFloat(document.getElementById('gMonto').value),
            extra: document.getElementById('gExtra').value,
            tipo: tipo,
            createdAt: Date.now()
        };
        if(tipo === 'cuota') {
            data.total = parseInt(document.getElementById('gTotal').value);
            data.actual = parseInt(document.getElementById('gActual').value);
        }
        await db.collection('usuarios').doc(currentUser.uid).collection('gastos').add(data);
        document.getElementById('gDesc').value = ""; document.getElementById('gMonto').value = "";
        showView('v-list', document.querySelector('.tab-btn'));
        loadData();
    }

    async function loadData() {
        const userDoc = await db.collection('usuarios').doc(currentUser.uid).get();
        let sueldo = userDoc.exists ? (userDoc.data().sueldo || 0) : 0;
        document.getElementById('inSueldo').value = sueldo;

        const snapshot = await db.collection('usuarios').doc(currentUser.uid).collection('gastos').orderBy('createdAt', 'desc').get();
        const listCont = document.getElementById('listaContenido');
        const listOcio = document.getElementById('listaOcio');
        listCont.innerHTML = ""; listOcio.innerHTML = "";
        
        let totalGastado = 0;

        snapshot.forEach(doc => {
            const g = doc.data();
            const id = doc.id;
            
            if (g.tipo === 'ocio') {
                totalGastado += g.monto;
                listOcio.innerHTML += `<div class="card ocio">
                    <div><b>${g.desc}</b><br><small>${g.extra}</small></div>
                    <b>$${g.monto.toLocaleString()}</b>
                </div>`;
            } else {
                if(pagadosLocal[id]) totalGastado += g.monto;
                listCont.innerHTML += `<div class="card ${g.tipo} ${pagadosLocal[id] ? 'pagado' : ''}">
                    <div><b>${g.desc}</b><br><small>${g.tipo === 'fijo' ? g.extra : 'Cuota '+g.actual+' de '+g.total}</small></div>
                    <button class="btn-check" onclick="togglePago('${id}')">$${g.monto.toLocaleString()}</button>
                </div>`;
            }
        });

        const saldo = sueldo - totalGastado;
        document.getElementById('txtSaldo').innerText = `$ ${saldo.toLocaleString()}`;
        document.getElementById('txtSaldo').style.color = saldo < 0 ? "#e74c3c" : "#2ecc71";
    }

    function togglePago(id) {
        pagadosLocal[id] = !pagadosLocal[id];
        localStorage.setItem('pagados_fb', JSON.stringify(pagadosLocal));
        loadData();
    }

    function showView(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function checkTipo() {
        document.getElementById('divCuotas').style.display = document.getElementById('tipoGasto').value === 'cuota' ? 'block' : 'none';
    }

    async function cerrarMes() {
        if(!confirm("¿Cerrar mes? Esto avanzará las cuotas pagadas y borrará el ocio.")) return;
        const snapshot = await db.collection('usuarios').doc(currentUser.uid).collection('gastos').get();
        for (const doc of snapshot.docs) {
            const g = doc.data();
            if(g.tipo === 'ocio') await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(doc.id).delete();
            if(g.tipo === 'cuota' && pagadosLocal[doc.id]) {
                if(g.actual >= g.total) await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(doc.id).delete();
                else await db.collection('usuarios').doc(currentUser.uid).collection('gastos').doc(doc.id).update({ actual: g.actual + 1 });
            }
        }
        pagadosLocal = {}; localStorage.setItem('pagados_fb', JSON.stringify(pagadosLocal));
        loadData();
    }
</script>
</body>
</html>
