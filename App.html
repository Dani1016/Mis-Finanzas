<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Finanzas Daniela - Full Control</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f1f5f9; --tc: #9b59b6; --ocio: #3498db; --fijo: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .dashboard { background: var(--dark); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .dashboard h1 { margin: 5px 0; font-size: 2rem; color: var(--primary); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: #e2e8f0; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { background: var(--dark); color: white; }

        .view { display: none; }
        .view.active { display: block; }
        
        .titulo-sec { font-size: 0.85rem; font-weight: bold; color: #64748b; margin: 15px 0 8px; text-transform: uppercase; }

        .card { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px; margin-bottom: 8px; border-radius: 12px; border: 1px solid #f1f5f9; border-left: 5px solid transparent; }
        .card.pagado { background: #ecfdf5; opacity: 0.7; border-color: #a7f3d0; }
        .card.fijo { border-left-color: var(--fijo); }
        .card.tc { border-left-color: var(--tc); }
        .card.ocio { border-left-color: var(--ocio); }

        .info b { display: block; font-size: 0.85rem; color: #1e293b; }
        .info small { color: #94a3b8; font-size: 0.7rem; }
        .badge { background: #e0f2fe; color: #075985; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        
        .btn-pago { background: #f1f5f9; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.75rem; min-width: 90px; }
        .pagado .btn-pago { background: var(--primary); color: white; }
        
        .form { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 12px; background: var(--dark); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div class="dashboard">
        <small>Saldo Disponible Real</small>
        <h1 id="txtSaldo">$ 0</h1>
        <input type="number" id="inSueldo" onchange="actualizarSueldo()" placeholder="Tu Sueldo" style="width:140px; background:rgba(255,255,255,0.1); border:1px solid #475569; color:white; border-radius:5px; text-align:center; padding:5px;">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showView('v-pagos')">Pagos</button>
        <button class="tab-btn" onclick="showView('v-ocio')">Ocio</button>
        <button class="tab-btn" onclick="showView('v-nueva-tc')">Nueva TC</button>
    </div>

    <div id="v-pagos" class="view active">
        <div class="titulo-sec">Fijos Mensuales</div>
        <div id="listaFijos"></div>
        
        <div class="titulo-sec">Cuotas Pendientes</div>
        <div id="listaCuotas"></div>
        
        <button onclick="cerrarMes()" style="width:100%; padding:15px; background:#6366f1; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:20px;">✨ CERRAR MES Y SUMAR CUOTAS</button>
    </div>

    <div id="v-ocio" class="view">
        <div class="form">
            <input type="text" id="oD" placeholder="¿En qué gastaste?">
            <input type="number" id="oM" placeholder="Monto $">
            <button class="btn-add" style="background:var(--ocio)" onclick="addOcio()">Registrar Ocio</button>
        </div>
        <div id="listaOcio"></div>
    </div>

    <div id="v-nueva-tc" class="view">
        <div class="form" style="border-color: var(--tc)">
            <p style="margin-top:0; color:var(--tc)"><b>Programar Compra TC</b></p>
            <input type="text" id="tD" placeholder="Descripción de la compra">
            <input type="number" id="tM" placeholder="Monto Total">
            <input type="number" id="tC" placeholder="Número de Cuotas">
            <button class="btn-add" style="background:var(--tc)" onclick="addTC()">Añadir al próximo mes</button>
        </div>
    </div>
</div>

<script>
    // 1. GASTOS FIJOS (Nunca se acaban)
    const fijosEstaticos = [
        { id: 'f1', desc: "Spotify", valor: 31000, cuenta: "Dale" },
        { id: 'f2', desc: "Disney +", valor: 47000, cuenta: "Dale" },
        { id: 'f3', desc: "Apple Cloud", valor: 45000, cuenta: "Dale" },
        { id: 'f4', desc: "Internet", valor: 100000, cuenta: "DaviPlata" },
        { id: 'f5', desc: "Administración", valor: 50000, cuenta: "DaviPlata" },
        { id: 'f6', desc: "Claro", valor: 38200, cuenta: "Nequi" },
        { id: 'f7', desc: "Luz", valor: 76600, cuenta: "Nequi", variable: true },
        { id: 'f8', desc: "Cuota Carro", valor: 1945000, cuenta: "Bancolombia" }
    ];

    // 2. DEUDAS POR CUOTAS (Tienen un fin)
    const cuotasBase = [
        { id: 'c1', desc: "Pamacol Technologies", cuota: 281232, total: 4, actual: 1 },
        { id: 'c2', desc: "Metrokia", cuota: 130472, total: 6, actual: 2 },
        { id: 'c3', desc: "Iberia", cuota: 152951, total: 24, actual: 1 },
        { id: 'c4', desc: "TC Davivienda Reloj", cuota: 119000, total: 12, actual: 1 },
        { id: 'c5', desc: "TC Davivienda Tablet", cuota: 138333, total: 6, actual: 1 },
        { id: 'c6', desc: "TC Exito Computador", cuota: 79583, total: 24, actual: 1 },
        { id: 'c7', desc: "Rappi Prestamo", cuota: 562500, total: 24, actual: 1 }
    ];

    let sueldo = parseFloat(localStorage.getItem('D_Sueldo')) || 0;
    let deudas = JSON.parse(localStorage.getItem('D_Deudas')) || cuotasBase;
    let ocios = JSON.parse(localStorage.getItem('D_Ocios')) || [];
    let pagados = JSON.parse(localStorage.getItem('D_Pagados')) || {};
    let cola = JSON.parse(localStorage.getItem('D_Cola')) || [];

    document.getElementById('inSueldo').value = sueldo;
    actualizarApp();

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function gestionarPago(id, valor, variable = false) {
        if(pagados[id]) delete pagados[id];
        else {
            let v = valor;
            if(variable) v = parseFloat(prompt("Valor de la factura de Luz:", valor)) || valor;
            pagados[id] = v;
        }
        save();
    }

    function addOcio() {
        const d = document.getElementById('oD').value;
        const m = parseFloat(document.getElementById('oM').value);
        if(!d || isNaN(m)) return;
        ocios.push({id: Date.now(), desc: d, monto: m});
        document.getElementById('oD').value = ""; document.getElementById('oM').value = "";
        save();
    }

    function addTC() {
        const d = document.getElementById('tD').value;
        const m = parseFloat(document.getElementById('tM').value);
        const c = parseInt(document.getElementById('tC').value);
        if(!d || isNaN(m)) return;
        cola.push({ id: 'n'+Date.now(), desc: d, cuota: Math.round(m/c), total: c, actual: 1 });
        localStorage.setItem('D_Cola', JSON.stringify(cola));
        alert("¡Guardado! Aparecerá al cerrar el mes actual.");
    }

    function cerrarMes() {
        if(!confirm("¿Cerrar mes? Esto aumentará el contador de cuotas de tus deudas pagadas.")) return;
        deudas = deudas.map(d => {
            if(pagados[d.id]) return { ...d, actual: d.actual + 1 };
            return d;
        }).filter(d => d.actual <= d.total);
        
        deudas = [...deudas, ...cola];
        cola = []; pagados = {}; ocios = [];
        localStorage.setItem('D_Cola', JSON.stringify(cola));
        save();
    }

    function actualizarSueldo() {
        sueldo = parseFloat(document.getElementById('inSueldo').value) || 0;
        save();
    }

    function save() {
        localStorage.setItem('D_Sueldo', sueldo);
        localStorage.setItem('D_Deudas', JSON.stringify(deudas));
        localStorage.setItem('D_Ocios', JSON.stringify(ocios));
        localStorage.setItem('D_Pagados', JSON.stringify(pagados));
        actualizarApp();
    }

    function actualizarApp() {
        const lf = document.getElementById('listaFijos');
        const lc = document.getElementById('listaCuotas');
        const lo = document.getElementById('listaOcio');
        lf.innerHTML = ""; lc.innerHTML = ""; lo.innerHTML = "";
        
        let gastado = 0;

        // Render Fijos
        fijosEstaticos.forEach(f => {
            const p = pagados[f.id];
            if(p) gastado += p;
            lf.innerHTML += `<div class="card fijo ${p?'pagado':''}">
                <div class="info"><b>${f.desc}</b><small>${f.cuenta}</small></div>
                <button class="btn-pago" onclick="gestionarPago('${f.id}', ${f.valor}, ${f.variable})">$${(p || f.valor).toLocaleString()}</button>
            </div>`;
        });

        // Render Cuotas
        deudas.forEach(d => {
            const p = pagados[d.id];
            if(p) gastado += d.cuota;
            lc.innerHTML += `<div class="card tc ${p?'pagado':''}">
                <div class="info"><b>${d.desc}</b><span class="badge">Cuota ${d.actual} de ${d.total}</span></div>
                <button class="btn-pago" onclick="gestionarPago('${d.id}', ${d.cuota})">$${d.cuota.toLocaleString()}</button>
            </div>`;
        });

        // Render Ocio
        ocios.forEach(o => {
            gastado += o.monto;
            lo.innerHTML += `<div class="card ocio"><b>${o.desc}</b> <span>$${o.monto.toLocaleString()}</span></div>`;
        });

        const saldo = sueldo - gastado;
        document.getElementById('txtSaldo').innerText = `$ ${saldo.toLocaleString()}`;
        document.getElementById('txtSaldo').style.color = saldo < 0 ? "#e74c3c" : "#2ecc71";
    }
</script>
</body>
</html>
